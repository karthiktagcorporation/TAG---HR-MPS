<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 172" role="img" aria-label="TAG — Power to People">
  <!-- TAG Corporation official logo. Brand colours: grey #6E6F71, red #C8322B -->
  <g font-family="'Arial Black', Arial, Helvetica, sans-serif" font-weight="900" font-size="150">
    <text x="54" y="128" text-anchor="middle" fill="#6E6F71">T</text>
    <text x="266" y="128" text-anchor="middle" fill="#6E6F71">G</text>
  </g>
  <!-- A drawn as a solid red triangle (no open counter) -->
  <polygon points="143,21 177,21 214,128 106,128" fill="#C8322B"/>
  <!-- white upward arrow forming the A's negative space -->
  <polygon points="160,46 138,78 150,78 150,128 170,128 170,78 182,78" fill="#FFFFFF"/>
  <!-- tagline: POWER (red) TO PEOPLE (grey) -->
  <text x="160" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="25" letter-spacing="6">
    <tspan fill="#C8322B">POWER </tspan><tspan fill="#6E6F71">TO PEOPLE</tspan>
  </text>
</svg>
