# ─────────────────────────────────────────────────────────────
# TAG - MPS : local / single-host production compose
# For Dokploy, deploy each service separately (see README).
# ─────────────────────────────────────────────────────────────
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tagmps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tagmps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tagmps}
      POSTGRES_DB: ${POSTGRES_DB:-tagmps}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - tagmps_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tagmps} -d ${POSTGRES_DB:-tagmps}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tagmps-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tagmps}:${POSTGRES_PASSWORD:-tagmps}@postgres:5432/${POSTGRES_DB:-tagmps}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-TAG Super Admin}
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@tagcorporation.net}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMe@12345}
      SEED_SAMPLE_DATA: ${SEED_SAMPLE_DATA:-false}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    # Runs migrations on boot, then starts the server.
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-TAG - MPS}
    container_name: tagmps-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  tagmps_pgdata:
    driver: local
